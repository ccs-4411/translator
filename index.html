<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="apple-touch-icon" href="多語言翻譯.png">
    <title>智慧翻譯 | 多引擎 + YouTube 字幕</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f7fb; font-family: system-ui, sans-serif; padding: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 16px; }
        .accordion { background: white; border-radius: 24px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .accordion-header { background: #fff; padding: 14px 18px; cursor: pointer; font-weight: 600; display: flex; justify-content: space-between; border-bottom: 1px solid #eef2f6; }
        .accordion-header .arrow { transition: transform 0.3s; }
        .accordion.hide .accordion-content { display: none; }
        .accordion.hide .arrow { transform: rotate(-90deg); }
        .accordion-content { padding: 16px; }
        .api-group { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
        .input-flex { flex: 2; min-width: 160px; }
        button { background: #eef2f8; border: 1px solid #dce3ec; padding: 8px 14px; border-radius: 40px; cursor: pointer; font-size: 0.8rem; }
        button.primary { background: #2c3e66; color: white; border: none; }
        button.danger { background: #fff0f0; border-color: #ffcdcd; color: #b13e3e; }
        input { width: 100%; padding: 10px 14px; border-radius: 30px; border: 1px solid #cfdde6; font-size: 0.9rem; }
        label { font-size: 0.7rem; font-weight: 600; color: #4b5565; margin-bottom: 4px; display: block; }
        .translate-card { background: white; border-radius: 24px; padding: 16px; margin-bottom: 16px; }
        .box-header { display: flex; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        select { flex: 2; padding: 10px; border-radius: 40px; border: 1px solid #cfdde6; background: white; font-size: 0.9rem; }
        textarea { width: 100%; padding: 14px; border-radius: 20px; border: 1px solid #e2e8f0; font-size: 1rem; min-height: 160px; resize: vertical; }
        .translate-bar { text-align: center; margin: 8px 0 16px; }
        .btn-translate { background: #2c3e66; color: white; padding: 12px 24px; border-radius: 60px; width: 80%; max-width: 260px; border: none; font-weight: 600; font-size: 1rem; }
        .message { background: #eef2fa; border-radius: 20px; padding: 10px 16px; margin-top: 12px; border-left: 4px solid #5f7f9e; font-size: 0.8rem; }
        .error { background: #ffefef; border-left-color: #d9534f; color: #a94442; }
        footer { text-align: center; font-size: 0.7rem; color: #6c7a8e; margin-top: 24px; }
        hr { margin: 12px 0; border-color: #eef2f6; }
        @media (max-width: 640px) {
            .container { padding: 12px; }
            .box-header { flex-direction: column; align-items: stretch; }
            select { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- API 金鑰設定（可收合） -->
    <div class="accordion" id="keyAccordion">
        <div class="accordion-header" id="accordionToggle">
            <span>🔑 API 金鑰設定 (Gemini + DeepL 選用)</span>
            <span class="arrow">▼</span>
        </div>
        <div class="accordion-content">
            <div style="margin-bottom: 20px;">
                <label>✨ Google Gemini API Key (2.5 Flash / 1.5 Flash)</label>
                <div class="api-group">
                    <div class="input-flex"><input type="password" id="geminiKey" placeholder="輸入 Gemini Key"></div>
                    <button id="saveGemini" class="primary">💾 儲存</button>
                    <button id="clearGemini" class="danger">🗑️ 清除</button>
                </div>
                <div id="geminiStatus" style="font-size:0.7rem; margin-top:6px;"></div>
            </div>
            <hr>
            <div>
                <label>🌐 DeepL API Key (選填，日韓優先)</label>
                <div class="api-group">
                    <div class="input-flex"><input type="password" id="deeplKey" placeholder="輸入 DeepL Key"></div>
                    <button id="saveDeepl" class="primary">💾 儲存</button>
                    <button id="clearDeepl" class="danger">🗑️ 清除</button>
                </div>
                <div id="deeplStatus" style="font-size:0.7rem; margin-top:6px;"></div>
            </div>
            <div class="message" style="margin-top: 12px; background:#eef2fa;">💡 策略：Gemini優先 → 英法德用Google；日韓有DeepL Key優先，無或失敗自動Google</div>
        </div>
    </div>

    <!-- 文字翻譯卡片 -->
    <div class="translate-card">
        <div class="box-header">
            <select id="sourceLang"></select>
            <div>
                <button id="pasteBtn">📋 貼上</button>
                <button id="fileBtn">📂 開啟檔案</button>
                <button id="clearSource" class="danger">清除</button>
                <input type="file" id="fileInput" accept=".txt,.md,.csv" style="display: none;" />
            </div>
        </div>
        <textarea id="sourceText" placeholder="輸入要翻譯的文字..."></textarea>
    </div>
    <div class="translate-card">
        <div class="box-header">
            <select id="targetLang"></select>
            <div><button id="copyBtn">📋 複製</button><button id="clearTarget" class="danger">清除</button></div>
        </div>
        <textarea id="targetText" placeholder="翻譯結果..." readonly></textarea>
    </div>
    <div class="translate-bar"><button id="translateBtn" class="btn-translate">✨ 開始翻譯</button></div>
    <div id="messageBox" class="message">✅ 就緒 | 引擎: Gemini 優先 → 英法德:Google / 日韓:DeepL(有Key) → Google降級</div>

    <!-- YouTube 字幕翻譯卡片 -->
    <div class="translate-card" style="background: #fef9e6;">
        <div class="box-header">
            <span>🎬 YouTube 字幕翻譯（下載 SRT）</span>
            <div><button id="clearYoutubeUrl" class="danger">清空</button></div>
        </div>
        <div class="api-group" style="margin-bottom: 12px;">
            <input type="text" id="youtubeUrl" placeholder="貼上 YouTube 網址，例如：https://youtu.be/xxx 或 https://www.youtube.com/watch?v=xxx" style="flex: 1;">
            <button id="fetchYoutubeBtn" class="primary" style="background:#f97316;">🚀 提取並翻譯</button>
        </div>
        <div id="youtubeStatus" class="message" style="margin-bottom: 12px;">💡 自動獲取影片字幕（優先英文），翻譯成繁體中文，可下載 SRT 字幕檔</div>
        <div id="youtubeProgress" style="display: none; background: #e9ecef; border-radius: 20px; padding: 8px 12px; margin-bottom: 12px; font-size: 0.8rem;"></div>
        <div style="margin-bottom: 12px;">
            <button id="toggleSubtitlesBtn" style="background: #d1d5db;">📄 顯示/隱藏字幕預覽</button>
        </div>
        <div id="subtitlesPreview" style="display: none;">
            <div id="youtubeOriginalBox" style="background:#f5f5f5; border-radius: 20px; padding: 12px; margin-bottom: 12px;">
                <div style="font-weight: 600; margin-bottom: 6px;">📄 原始字幕</div>
                <div id="youtubeOriginalText" style="white-space: pre-wrap; word-break: break-word; max-height: 200px; overflow-y: auto; font-size: 0.8rem;"></div>
            </div>
            <div id="youtubeTranslatedBox" style="background:#eef2ff; border-radius: 20px; padding: 12px;">
                <div style="font-weight: 600; margin-bottom: 6px;">✨ 翻譯結果（繁體中文）</div>
                <div id="youtubeTranslatedText" style="white-space: pre-wrap; word-break: break-word; max-height: 200px; overflow-y: auto; font-size: 0.9rem;"></div>
            </div>
        </div>
        <div style="display: flex; gap: 12px; margin-top: 16px;">
            <button id="downloadSrtBtn" class="primary" disabled style="background: #2c3e66; flex: 1;">📥 下載 SRT 字幕檔（僅翻譯）</button>
            <button id="downloadBilingualSrtBtn" class="primary" disabled style="background: #4b6b8f; flex: 1;">📥 下載雙語 SRT（原文+翻譯）</button>
        </div>
    </div>
    <footer>金鑰僅儲存於瀏覽器，並加密傳送至後端（後端不記錄）</footer>
</div>

<script>
    // 語言列表
    const LANG_LIST = [
        { code: "zh-TW", name: "繁體中文" }, { code: "zh-CN", name: "簡體中文" },
        { code: "en", name: "英文" }, { code: "ja", name: "日文" },
        { code: "ko", name: "韓文" }, { code: "fr", name: "法文" }, { code: "de", name: "德文" }
    ];
    function populateSelects() {
        const source = document.getElementById('sourceLang');
        const target = document.getElementById('targetLang');
        const opts = LANG_LIST.map(l => `<option value="${l.code}">${l.name}</option>`).join('');
        source.innerHTML = opts; target.innerHTML = opts;
        source.value = "zh-TW"; target.value = "en";
    }
    populateSelects();

    // 金鑰管理 (localStorage)
    const geminiInput = document.getElementById('geminiKey');
    const deeplInput = document.getElementById('deeplKey');
    const geminiStatus = document.getElementById('geminiStatus');
    const deeplStatus = document.getElementById('deeplStatus');
    function loadKeys() {
        const g = localStorage.getItem('gemini_key');
        const d = localStorage.getItem('deepl_key');
        if (g) { geminiInput.value = g; geminiStatus.innerText = '✅ 已載入'; }
        if (d) { deeplInput.value = d; deeplStatus.innerText = '✅ 已載入'; }
    }
    document.getElementById('saveGemini').onclick = () => { let k = geminiInput.value.trim(); if(k){ localStorage.setItem('gemini_key', k); geminiStatus.innerText = '✅ 已儲存'; } };
    document.getElementById('clearGemini').onclick = () => { localStorage.removeItem('gemini_key'); geminiInput.value = ''; geminiStatus.innerText = '🧹 已清除'; };
    document.getElementById('saveDeepl').onclick = () => { let k = deeplInput.value.trim(); if(k){ localStorage.setItem('deepl_key', k); deeplStatus.innerText = '✅ 已儲存'; } };
    document.getElementById('clearDeepl').onclick = () => { localStorage.removeItem('deepl_key'); deeplInput.value = ''; deeplStatus.innerText = '🧹 已清除'; };
    loadKeys();

    // 文字翻譯相關
    const sourceText = document.getElementById('sourceText');
    const targetText = document.getElementById('targetText');
    const sourceLang = document.getElementById('sourceLang');
    const targetLang = document.getElementById('targetLang');
    const msgBox = document.getElementById('messageBox');
    function setMsg(msg, isErr=false) { msgBox.innerHTML = msg; msgBox.classList.toggle('error', isErr); }

    document.getElementById('translateBtn').onclick = async () => {
        const text = sourceText.value.trim();
        if(!text){ setMsg('請輸入文字', true); return; }
        const src = sourceLang.value, tgt = targetLang.value;
        if(src === tgt){ targetText.value = text; setMsg('來源與目標相同'); return; }
        targetText.value = '⏳ 翻譯中...';
        setMsg('🔄 呼叫後端...');
        try {
            const gemini_key = localStorage.getItem('gemini_key') || '';
            const deepl_key = localStorage.getItem('deepl_key') || '';
            const res = await fetch('/translate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text, source_lang: src, target_lang: tgt, gemini_key, deepl_key })
            });
            const data = await res.json();
            if(!res.ok) throw new Error(data.error || '失敗');
            targetText.value = data.result;
            setMsg(`✅ 完成 (引擎: ${data.engine})`);
        } catch(err) { targetText.value = '❌ 錯誤'; setMsg(`錯誤: ${err.message}`, true); }
    };

    document.getElementById('pasteBtn').onclick = async () => { try { const t = await navigator.clipboard.readText(); sourceText.value = t; setMsg('已貼上'); } catch(e){ setMsg('無法讀取剪貼簿', true); } };
    document.getElementById('clearSource').onclick = () => { sourceText.value = ''; setMsg('原文已清除'); };
    document.getElementById('copyBtn').onclick = async () => { if(!targetText.value) return; await navigator.clipboard.writeText(targetText.value); setMsg('已複製'); };
    document.getElementById('clearTarget').onclick = () => { targetText.value = ''; setMsg('結果已清除'); };

    // 檔案上傳功能
    const fileBtn = document.getElementById('fileBtn');
    const fileInput = document.getElementById('fileInput');
    fileBtn.onclick = () => fileInput.click();
    fileInput.onchange = (event) => {
        const file = event.target.files[0];
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) { setMsg('檔案過大，請選擇小於 5MB 的文字檔', true); fileInput.value = ''; return; }
        const reader = new FileReader();
        reader.onload = (e) => { sourceText.value = e.target.result; setMsg(`✅ 已開啟檔案：${file.name} (${(file.size/1024).toFixed(1)} KB)`, false); };
        reader.onerror = () => { setMsg('❌ 檔案讀取失敗', true); };
        reader.readAsText(file, 'UTF-8');
    };

    // 收合面板
    const accordion = document.getElementById('keyAccordion');
    document.getElementById('accordionToggle').onclick = () => accordion.classList.toggle('hide');

    // ========== YouTube 字幕翻譯功能 ==========
    let currentSubtitles = [];
    const youtubeUrlInput = document.getElementById('youtubeUrl');
    const fetchYoutubeBtn = document.getElementById('fetchYoutubeBtn');
    const clearYoutubeBtn = document.getElementById('clearYoutubeUrl');
    const youtubeStatusDiv = document.getElementById('youtubeStatus');
    const youtubeProgress = document.getElementById('youtubeProgress');
    const toggleSubtitlesBtn = document.getElementById('toggleSubtitlesBtn');
    const subtitlesPreview = document.getElementById('subtitlesPreview');
    const youtubeOriginalDiv = document.getElementById('youtubeOriginalText');
    const youtubeTranslatedDiv = document.getElementById('youtubeTranslatedText');
    const downloadSrtBtn = document.getElementById('downloadSrtBtn');
    const downloadBilingualSrtBtn = document.getElementById('downloadBilingualSrtBtn');

    function setYoutubeMsg(msg, isErr = false) {
        youtubeStatusDiv.innerHTML = msg;
        youtubeStatusDiv.classList.toggle('error', isErr);
    }
    toggleSubtitlesBtn.onclick = () => {
        if (subtitlesPreview.style.display === 'none') {
            subtitlesPreview.style.display = 'block';
            toggleSubtitlesBtn.innerText = '📄 隱藏字幕預覽';
        } else {
            subtitlesPreview.style.display = 'none';
            toggleSubtitlesBtn.innerText = '📄 顯示字幕預覽';
        }
    };
    function formatTime(seconds) {
        const hours = Math.floor(seconds / 3600);
        const minutes = Math.floor((seconds % 3600) / 60);
        const secs = Math.floor(seconds % 60);
        const millis = Math.floor((seconds % 1) * 1000);
        return `${hours.toString().padStart(2,'0')}:${minutes.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')},${millis.toString().padStart(3,'0')}`;
    }
    function downloadSrt(subtitles, filename) {
        let srtContent = '';
        for (let i = 0; i < subtitles.length; i++) {
            const sub = subtitles[i];
            if (!sub.translated || sub.translated.trim() === '') continue;
            const index = i + 1;
            const startTime = formatTime(sub.start);
            const endTime = formatTime(sub.start + sub.duration);
            srtContent += `${index}\n${startTime} --> ${endTime}\n${sub.translated}\n\n`;
        }
        const blob = new Blob([srtContent], { type: 'text/plain;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        link.click();
        URL.revokeObjectURL(link.href);
    }
    function downloadBilingualSrt(subtitles, filename) {
        let srtContent = '';
        for (let i = 0; i < subtitles.length; i++) {
            const sub = subtitles[i];
            if (!sub.original && !sub.translated) continue;
            const original = sub.original || '';
            const translated = sub.translated || '';
            if (original.trim() === '' && translated.trim() === '') continue;
            const index = i + 1;
            const startTime = formatTime(sub.start);
            const endTime = formatTime(sub.start + sub.duration);
            let text = '';
            if (original.trim()) text += original;
            if (translated.trim()) text += (text ? '\n' : '') + translated;
            srtContent += `${index}\n${startTime} --> ${endTime}\n${text}\n\n`;
        }
        const blob = new Blob([srtContent], { type: 'text/plain;charset=utf-8' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = filename;
        link.click();
        URL.revokeObjectURL(link.href);
    }

    fetchYoutubeBtn.onclick = async () => {
        const url = youtubeUrlInput.value.trim();
        if (!url) { setYoutubeMsg('❌ 請先貼上 YouTube 網址', true); return; }
        setYoutubeMsg('⏳ 正在提取字幕並翻譯，請稍候...');
        youtubeProgress.style.display = 'block';
        youtubeProgress.innerText = '🔄 正在擷取字幕...';
        youtubeOriginalDiv.innerText = '載入中...';
        youtubeTranslatedDiv.innerText = '載入中...';
        downloadSrtBtn.disabled = true;
        downloadBilingualSrtBtn.disabled = true;
        currentSubtitles = [];
        try {
            const gemini_key = localStorage.getItem('gemini_key') || '';
            const deepl_key = localStorage.getItem('deepl_key') || '';
            const response = await fetch('/process_youtube', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ url: url, gemini_key: gemini_key, deepl_key: deepl_key, target_lang: 'zh-TW' })
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || '未知錯誤');
            currentSubtitles = data.subtitles;
            const originalPreview = currentSubtitles.map(s => s.original).join(' ').substring(0, 500) + (currentSubtitles.length > 10 ? '...' : '');
            const translatedPreview = currentSubtitles.map(s => s.translated).join(' ').substring(0, 500) + (currentSubtitles.length > 10 ? '...' : '');
            youtubeOriginalDiv.innerText = originalPreview || '（無文字）';
            youtubeTranslatedDiv.innerText = translatedPreview || '（無文字）';
            setYoutubeMsg(`✅ 成功獲取 ${currentSubtitles.length} 條字幕，已翻譯成繁體中文。可下載 SRT 檔案。`);
            downloadSrtBtn.disabled = false;
            downloadBilingualSrtBtn.disabled = false;
        } catch (err) {
            youtubeOriginalDiv.innerText = '獲取失敗';
            youtubeTranslatedDiv.innerText = '錯誤';
            setYoutubeMsg(`❌ 錯誤：${err.message}`, true);
        } finally {
            youtubeProgress.style.display = 'none';
        }
    };
    clearYoutubeBtn.onclick = () => {
        youtubeUrlInput.value = '';
        youtubeOriginalDiv.innerText = '';
        youtubeTranslatedDiv.innerText = '';
        setYoutubeMsg('🧹 已清空，可貼上新的網址');
        downloadSrtBtn.disabled = true;
        downloadBilingualSrtBtn.disabled = true;
        currentSubtitles = [];
        subtitlesPreview.style.display = 'none';
        toggleSubtitlesBtn.innerText = '📄 顯示字幕預覽';
    };
    downloadSrtBtn.onclick = () => {
        if (currentSubtitles.length === 0) { alert('尚無字幕數據，請先提取翻譯'); return; }
        const videoId = youtubeUrlInput.value.trim().match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]+)/)?.[1] || 'subtitles';
        downloadSrt(currentSubtitles, `youtube_${videoId}_zh-TW.srt`);
    };
    downloadBilingualSrtBtn.onclick = () => {
        if (currentSubtitles.length === 0) { alert('尚無字幕數據，請先提取翻譯'); return; }
        const videoId = youtubeUrlInput.value.trim().match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([\w-]+)/)?.[1] || 'subtitles';
        downloadBilingualSrt(currentSubtitles, `youtube_${videoId}_bilingual.srt`);
    };
</script>
</body>
</html>
</html>
