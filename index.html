<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>語音翻譯官</title>

    <link rel="apple-touch-icon" href="語音助理.png">
    <meta name="apple-mobile-web-app-title" content="語音翻譯官">

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f2f4f7;
            margin: 0;
            padding: 15px;
            text-align: center;
        }

        .card {
            max-width: 450px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            box-sizing: border-box;
        }

        h2 {
            color: #1a73e8;
            margin-top: 0;
            font-size: 1.6rem;
            cursor: pointer;
        }

        #status {
            font-size: 0.95rem;
            color: #1a73e8;
            margin-bottom: 12px;
            font-weight: bold;
            height: 1.2em;
        }

        select {
            width: 100%;
            padding: 14px;
            border-radius: 15px;
            border: 2px solid #eee;
            font-size: 1.1rem;
            margin-bottom: 10px;
            outline: none;
            box-sizing: border-box;
            background: white;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            margin: 15px 0;
        }

        .mic-btn {
            flex: 1;
            height: 120px;
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s, background 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        #btn-me { background: #1a73e8; }
        #btn-other { background: #34a853; }
        #btn-stop { background: #6c757d; height: 50px; font-size: 1rem; border-radius: 15px; }

        .active {
            background: #ea4335 !important;
            transform: scale(0.96);
        }

        #result-box {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 18px;
            text-align: left;
            min-height: 120px;
            box-sizing: border-box;
            margin-top: 15px;
        }

        #original {
            color: #888;
            border-bottom: 1px solid #eee;
            padding-bottom: 8px;
            font-size: 1rem;
            min-height: 1.5em;
        }

        #translated {
            font-size: 1.6rem;
            font-weight: bold;
            margin-top: 12px;
            color: #111;
            min-height: 1.5em;
            word-break: break-all;
        }

        .play-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .play-btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 15px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        #replay-btn { background: #ff9800; }
        .play-btn:active { opacity: 0.8; }
    </style>
</head>

<body>

<div class="card">
    <h2 onclick="testSpeech()">🎙️ 語音翻譯官</h2>
    <div id="status">準備就緒</div>
    
    <select id="target"></select>

    <div class="btn-group">
        <button id="btn-me" class="mic-btn" onclick="runMic('me')">
            <span>🎤</span>
            <span>我講中文</span>
        </button>
        <button id="btn-other" class="mic-btn" onclick="runMic('other')">
            <span>🎧</span>
            <span>對方講</span>
        </button>
    </div>

    <div class="btn-group" style="margin: 0;">
        <button id="btn-stop" class="mic-btn" onclick="stopMic()">⏹️ 停止聆聽</button>
    </div>

    <div id="result-box">
        <div id="original">等待說話...</div>
        <div id="translated">翻譯結果</div>
        
        <div class="play-group">
            <button id="replay-btn" class="play-btn" onclick="replayAudio()">🔊 重播翻譯</button>
        </div>
    </div>
</div>

<script>
let recognition = null;
let isProcessing = false;
let VOICES = [];
let audioUnlocked = false;

let lastSpeakText = "";
let lastSpeakLang = "";

// 🗂️ 直接崁入你最完整、帶有分類的語言清單
const LANGUAGES = [
    {"group":"中文","name":"中文（香港）","code":"zh-TW","voice":"zh-HK","label":"繁體中文 🇭🇰"},
    {"group":"英文","name":"英文（美國）","code":"en","voice":"en-US","label":"English 🇺🇸"},
    {"group":"英文","name":"英文（英國）","code":"en","voice":"en-GB","label":"English 🇬🇧"},
    {"group":"日韓","name":"日文","code":"ja","voice":"ja-JP","label":"日本語 🇯🇵"},
    {"group":"日韓","name":"韓文","code":"ko","voice":"ko-KR","label":"한국어 🇰🇷"},
    {"group":"東南亞","name":"越南文","code":"vi","voice":"vi-VN","label":"Tiếng Việt 🇻🇳"},
    {"group":"東南亞","name":"泰文","code":"th","voice":"th-TH","label":"ภาษาไทย 🇹🇭"},
    {"group":"歐洲","name":"西班牙文","code":"es","voice":"es-ES","label":"Español 🇪🇸"},
    {"group":"歐洲","name":"法文","code":"fr","voice":"fr-FR","label":"Français 🇫🇷"},
    {"group":"歐洲","name":"德文","code":"de","voice":"de-DE","label":"Deutsch 🇩🇪"},
    {"group":"歐洲","name":"義大利文","code":"it","voice":"it-IT","label":"Italiano 🇮🇹"},
    {"group":"歐洲","name":"捷克文","code":"cs","voice":"cs-CZ","label":"Čeština 🇨🇿"},
    {"group":"歐洲","name":"丹麥文","code":"da","voice":"da-DK","label":"Dansk 🇩🇰"},
    {"group":"歐洲","name":"芬蘭文","code":"fi","voice":"fi-FI","label":"Suomi 🇫🇮"},
    {"group":"歐洲","name":"瑞典文","code":"sv","voice":"sv-SE","label":"Svenska 🇸🇪"},
    {"group":"東南亞","name":"印尼文","code":"id","voice":"id-ID","label":"Bahasa Indonesia 🇮🇩"},
    {"group":"歐洲","name":"葡萄牙文","code":"pt","voice":"pt-PT","label":"Português 🇵🇹"},
    {"group":"中東","name":"土耳其文","code":"tr","voice":"tr-TR","label":"Türkçe 🇹🇷"},
    {"group":"中東","name":"阿拉伯文","code":"ar","voice":"ar-SA","label":"العربية 🇸🇦"}
];

// ============================
// 1. 瀏覽器語音合成（TTS）初始化
// ============================
function loadVoices() {
    return new Promise(resolve => {
        let voices = speechSynthesis.getVoices();
        if (voices.length) return resolve(voices);
        speechSynthesis.onvoiceschanged = () => resolve(speechSynthesis.getVoices());
    });
}

async function initSpeech() {
    VOICES = await loadVoices();
}

document.body.addEventListener("click", () => {
    if (!audioUnlocked) {
        speechSynthesis.speak(new SpeechSynthesisUtterance(""));
        audioUnlocked = true;
    }
}, { once: true });

// ============================
// 2. 初始化選單（優化版：支援 optgroup 群組分類）
// ============================
function initLangs() {
    const sel = document.getElementById("target");
    sel.innerHTML = "";
    
    // 建立群組對照表，動態生成美麗的下拉選單
    const groups = {};
    
    LANGUAGES.forEach(l => {
        const groupName = l.group || "其他";
        if (!groups[groupName]) {
            groups[groupName] = document.createElement("optgroup");
            groups[groupName].label = groupName;
            sel.appendChild(groups[groupName]);
        }
        
        const opt = document.createElement("option");
        opt.value = l.name;
        opt.textContent = `${l.name} ${l.label}`;
        opt.dataset.v = l.voice;
        opt.dataset.code = l.code;
        
        groups[groupName].appendChild(opt);
    });

    // 從本地瀏覽器讀取上次選擇的語言
    const saved = localStorage.getItem("targetLang");
    if (saved) sel.value = saved;
    sync();
}

function sync() {
    const sel = document.getElementById("target");
    localStorage.setItem("targetLang", sel.value);
}
document.getElementById("target").addEventListener("change", sync);

// ============================
// 3. 瀏覽器原生語音辨識（STT）
// ============================
function initRecognition() {
    const Speech = window.webkitSpeechRecognition || window.SpeechRecognition;
    if (!Speech) {
        document.getElementById("status").innerText = "不支援語音功能";
        return;
    }
    
    recognition = new Speech();
    recognition.continuous = false;

    recognition.onresult = (e) => {
        const text = e.results[0][0].transcript;
        document.getElementById("original").innerText = text;
        handleTranslation(text);
    };

    recognition.onerror = (e) => {
        console.error("語音辨識錯誤:", e.error);
        if (e.error === "service-not-allowed" || e.error === "language-not-supported") {
            document.getElementById("status").innerText = "⚠️ 瀏覽器不支援此語音輸入";
        } else if (e.error === "no-speech") {
            document.getElementById("status").innerText = "⚠️ 沒有聽到聲音";
        } else {
            document.getElementById("status").innerText = "⚠️ 語音辨識失敗";
        }
        resetUI();
    };
    recognition.onend = resetUI;
}

// ============================
// 4. 控制麥克風啟動
// ============================
function runMic(mode) {
    if (isProcessing) return;
    speechSynthesis.cancel();
    if (!recognition) initRecognition();

    const sel = document.getElementById("target");
    const selectedOpt = sel.selectedOptions[0];
    const isMe = (mode === "me");

    // 關鍵修正：我方講話一律使用台灣繁中 zh-TW，對方講話則拉取清單中的 voice (例如 ja-JP, en-US)
    recognition.lang = isMe ? "zh-TW" : selectedOpt.dataset.v;

    document.querySelectorAll('.mic-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(isMe ? "btn-me" : "btn-other").classList.add("active");

    try { recognition.abort(); } catch(e) {}

    setTimeout(() => {
        try {
            recognition.start();
            document.getElementById("status").innerText = "🎤 聆聽中...請說話";
        } catch(err) {
            document.getElementById("status").innerText = "⚠️ 無法啟動麥克風";
        }
    }, 300);
}

function stopMic() {
    if (recognition) {
        try { recognition.abort(); } catch(e) {}
        document.getElementById("status").innerText = "準備就緒";
        resetUI();
    }
}

// ============================
// 5. 核心：免後端公共翻譯接口呼叫
// ============================
async function handleTranslation(text) {
    isProcessing = true;
    document.getElementById("status").innerText = "翻譯中...";

    const sel = document.getElementById("target");
    const selectedOpt = sel.selectedOptions[0];
    const targetCode = selectedOpt.dataset.code;
    const targetVoice = selectedOpt.dataset.v;
    
    // 判斷當前翻譯方向 (若當前辨識語系為繁中，代表是我講的話，要翻成外語；反之亦然)
    const isMe = (recognition.lang === "zh-TW");
    const sourceLang = isMe ? "zh-TW" : targetCode;
    const targetLang = isMe ? targetCode : "zh-TW";

    try {
        const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${sourceLang}&tl=${targetLang}&dt=t&q=${encodeURIComponent(text)}`;
        
        const res = await fetch(url);
        const data = await res.json();
        
        if (data && data[0]) {
            let translatedText = "";
            data[0].forEach(row => {
                if(row[0]) translatedText += row[0];
            });

            document.getElementById("translated").innerText = translatedText;
            document.getElementById("status").innerText = "完成";

            const playLang = isMe ? targetVoice : "zh-TW";
            speak(translatedText, playLang);
        } else {
            throw new Error("回應格式解析失敗");
        }
    } catch(err) {
        console.error(err);
        document.getElementById("translated").innerText = "⚠️ 翻譯失敗";
        document.getElementById("status").innerText = "翻譯失敗";
    }
    isProcessing = false;
}

// ============================
// 6. 語音朗讀與重播
// ============================
function speak(text, lang) {
    lastSpeakText = text;
    lastSpeakLang = lang;
    speechSynthesis.cancel();

    const msg = new SpeechSynthesisUtterance(text);
    const formattedLang = lang.replace('_','-');
    
    const voice = VOICES.find(v => v.lang.replace('_','-') === formattedLang)
               || VOICES.find(v => v.lang.startsWith(formattedLang.split('-')[0]));

    if (voice) msg.voice = voice;
    msg.lang = formattedLang;

    setTimeout(() => { speechSynthesis.speak(msg); }, 120);
}

function replayAudio() {
    if (!lastSpeakText) {
        document.getElementById("status").innerText = "沒有可重播內容";
        return;
    }
    document.getElementById("status").innerText = "🔊 重播中...";
    speak(lastSpeakText, lastSpeakLang);
}

function resetUI() {
    document.querySelectorAll('.mic-btn').forEach(b => b.classList.remove('active'));
}

function testSpeech() { 
    speak("語音測試正常", "zh-TW"); 
}

// ============================
// 啟動流程
// ============================
initSpeech();
initLangs();
initRecognition();
</script>

</body>
</html>
