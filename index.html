<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <link rel="apple-touch-icon" href="多語言翻譯.png">
    <title>智慧翻譯 | 後端備援版 (Railway)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            background: #f5f7fb; 
            font-family: "Microsoft JhengHei", "Heiti TC", "Apple LiGothic", system-ui, sans-serif !important; 
            font-weight: 600 !important;
            color: #111827 !important;
            padding: 0; 
        }
        .container { max-width: 800px; margin: 0 auto; padding: 16px; }

        .accordion { background: white; border-radius: 24px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .accordion-header { background: #fff; padding: 14px 18px; cursor: pointer; font-weight: 700; display: flex; justify-content: space-between; border-bottom: 1px solid #eef2f6; font-size: 1rem; }
        .accordion-header .arrow { transition: transform 0.3s; }
        .accordion.hide .accordion-content { display: none; }
        .accordion.hide .arrow { transform: rotate(-90deg); }
        .accordion-content { padding: 16px; }

        .api-group { display: flex; flex-wrap: wrap; gap: 10px; align-items: flex-end; }
        .input-flex { flex: 2; min-width: 160px; }
        
        button { 
            background: #eef2f8; 
            border: 2px solid #cbd5e1; 
            padding: 8px 16px; 
            border-radius: 40px; 
            cursor: pointer; 
            font-size: 0.9rem; 
            font-weight: 700 !important;
            color: #1e293b;
            transition: all 0.2s; 
        }
        button:hover { background: #e1e9f3; border-color: #94a3b8; }
        button.primary { background: #2c3e66; color: white; border: none; }
        button.primary:hover { background: #1f2d4d; }
        button.danger { background: #fff0f0; border-color: #fca5a5; color: #991b1b; }
        button.danger:hover { background: #ffeeee; border-color: #f87171; }
        
        input, select { 
            width: 100%; 
            padding: 10px 14px; 
            border-radius: 30px; 
            border: 2px solid #cbd5e1; 
            font-size: 0.95rem; 
            font-weight: 700 !important;
            color: #111827;
            background: white; 
        }
        input:focus, select:focus { border-color: #2c3e66; outline: none; }
        label { font-size: 0.85rem; font-weight: 700; color: #1e293b; margin-bottom: 6px; display: block; }

        .translate-card { background: white; border-radius: 24px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .box-header { display: flex; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .lang-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
        .lang-item { flex: 1; min-width: 120px; }
        
        textarea { 
            width: 100%; 
            padding: 14px; 
            border-radius: 20px; 
            border: 2px solid #cbd5e1; 
            font-size: 16px !important; 
            font-weight: 700 !important;
            line-height: 1.6 !important;
            color: #000000 !important;
            min-height: 180px; 
            resize: vertical; 
            font-family: "Microsoft JhengHei", monospace !important; 
        }
        textarea:focus { border-color: #2c3e66; outline: none; }

        .translate-bar { text-align: center; margin: 8px 0 16px; }
        .btn-translate { 
            background: #2c3e66; 
            color: white; 
            padding: 14px 28px; 
            border-radius: 60px; 
            width: 80%; 
            max-width: 280px; 
            border: none; 
            font-weight: 800 !important; 
            font-size: 1.1rem; 
            letter-spacing: 1px;
            cursor: pointer; 
            box-shadow: 0 4px 14px rgba(44,62,102,0.3); 
        }
        .btn-translate:hover { background: #1f2d4d; transform: scale(1.02); }

        .message { 
            background: #eef2fa; 
            border-radius: 20px; 
            padding: 12px 18px; 
            margin-top: 12px; 
            border-left: 6px solid #2c3e66; 
            font-size: 0.95rem; 
            font-weight: 700 !important;
            color: #1e3a8a !important;
        }
        .error { background: #fef2f2; border-left-color: #ef4444; color: #991b1b !important; }
        .warning { background: #fffbeb; border-left-color: #f59e0b; color: #78350f !important; }

        .srt-mode-box { background: #eafeff; border-radius: 20px; padding: 16px; margin: 12px 0; border: 2px dashed #06b6d4; }
        .srt-mode { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; font-size: 1rem; }
        .srt-mode label { display: inline-flex; align-items: center; gap: 6px; font-size: 1rem; font-weight: 700; cursor: pointer; color: #0f172a; margin-bottom: 0; }
        .srt-mode input[type="checkbox"] { width: 20px; height: 20px; margin: 0; cursor: pointer; }
        .srt-layout-select { width: auto; padding: 6px 14px; border-radius: 15px; font-size: 0.9rem; }
        .srt-hint { font-size: 0.85rem; color: #ea580c; margin-top: 8px; display: block; font-weight: 700; }

        footer { text-align: center; font-size: 0.8rem; color: #374151; font-weight: 700; margin-top: 24px; line-height: 1.6; }

        @media (max-width: 640px) {
            .container { padding: 12px; }
            .lang-row { flex-direction: column; gap: 8px; }
            .srt-mode { flex-direction: column; align-items: flex-start; gap: 10px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="accordion hide" id="keyAccordion"> 
        <div class="accordion-header" id="accordionToggle">
            <span>🔑 API 金鑰設定 (後端備援版)</span>
            <span class="arrow">▼</span>
        </div>
        <div class="accordion-content">
            <div style="margin-bottom: 20px;">
                <label>✨ Google Gemini API Key (可選，若已在 Railway 環境變數設定則免填)</label>
                <div class="api-group">
                    <div class="input-flex"><input type="password" id="geminiKey" placeholder="輸入 AI Studio 申請的 Gemini Key (非必要)"></div>
                    <button id="saveGemini" class="primary">💾 儲存</button>
                    <button id="clearGemini" class="danger">🗑️ 清除</button>
                </div>
                <div id="geminiStatus" style="font-size:0.8rem; margin-top:6px; font-weight:bold;"></div>
            </div>
            <div class="message">💡 安全提示：金鑰僅存於瀏覽器 LocalStorage，請求會透過您的後端伺服器轉發，後端會自動啟用備援機制。</div>
        </div>
    </div>

    <div class="translate-card">
        <div class="lang-row">
            <div class="lang-item">
                <label>📖 來源語言</label>
                <select id="sourceLang"></select>
            </div>
            <div class="lang-item">
                <label>🏷️ 行業領域（引導 AI 術語優化）</label>
                <select id="domainSelect">
                    <option value="general">一般翻譯</option>
                    <option value="travel">旅遊</option>
                    <option value="baseball">棒球</option>
                    <option value="basketball">籃球</option>
                    <option value="gaming">遊戲</option>
                    <option value="news">新聞</option>
                    <option value="entertainment">娛樂</option>
                    <option value="mechanical">機械</option>
                    <option value="semiconductor">半導體</option>
                    <option value="medical">醫療</option>
                    <option value="legal">法律</option>
                    <option value="it">資訊科技</option>
                    <option value="finance">金融</option>
                </select>
            </div>
            <div class="lang-item">
                <label>🎯 目標語言</label>
                <select id="targetLang"></select>
            </div>
        </div>

        <div class="box-header">
            <div style="flex:1"></div>
            <div>
                <button id="pasteBtn">📋 貼上</button>
                <button id="fileBtn">📂 開啟檔案</button>
                <button id="clearSource" class="danger">清除</button>
                <input type="file" id="fileInput" accept=".txt,.md,.csv,.srt" style="display: none;">
            </div>
        </div>
        <textarea id="sourceText" placeholder="輸入要翻譯的文字... (若要處理 SRT 字幕，請勾選下方模式)"></textarea>
        <div style="font-size:0.85rem; color:#1e3a8a; margin-top:8px; font-weight:bold;">💡 提示：若貼上 SRT 字幕內容，請務必勾選下方「SRT 字幕模式」，以啟用高效安全分批翻譯。</div>
    </div>

    <div class="srt-mode-box">
        <div class="srt-mode">
            <label>
                <input type="checkbox" id="srtModeCheckbox"> 🎞️ <strong>開啟 SRT 字幕模式</strong> (後端智慧備援 + 自動重試)
            </label>
            
            <div id="srtOptions" style="display: inline-flex; align-items: center; gap: 8px; opacity: 0.5; pointer-events: none;">
                <label>樣式版面：</label>
                <select id="srtLayoutSelect" class="srt-layout-select">
                    <option value="original_first">雙語（原文在上、譯文在下）</option>
                    <option value="translated_first">雙語（譯文在上、原文在下）</option>
                    <option value="translated_only">單語（僅保留翻譯後的譯文）</option>
                </select>
            </div>
        </div>
        <span class="srt-hint">🚀 後端會自動處理 Gemini 配額問題，當 Gemini 失敗時無縫切換至 Google 翻譯或 MyMemory 備援。</span>
    </div>

    <div class="translate-bar">
        <button id="translateBtn" class="btn-translate">✨ 開始翻譯</button>
    </div>

    <div id="messageBox" class="message">✅ 後端備援模式已就緒 | 請先配置頂部金鑰設定（可選）。</div>
    <footer>金鑰僅儲存於個人瀏覽器 LocalStorage，請求經由您的 Railway 後端轉發，安全可靠。</footer>
    
    <div class="translate-card" style="margin-top: 16px;">
        <div class="box-header">
            <div style="flex:1"></div>
            <div><button id="copyBtn">📋 複製結果</button><button id="clearTarget" class="danger">清除</button></div>
        </div>
        <textarea id="targetText" placeholder="翻譯結果會在此顯示..." readonly></textarea>
    </div>
</div>

<script>
    // =============================================================
    //  🚀 重要：請將下方的 YOUR_RAILWAY_URL 換成您的 Railway 後端網址
    // =============================================================
    const BACKEND_URL = "https://translator-production-a66b.up.railway.app";

    const SRC_LANG_LIST = [
        { code: "auto", name: "🤖 自動偵測語言" },
        { code: "zh-TW", name: "繁體中文" }, { code: "zh-CN", name: "簡體中文" },
        { code: "en", name: "英文" }, { code: "ja", name: "日文" },
        { code: "ko", name: "韓文" }, { code: "fr", name: "法文" }, { code: "de", name: "德文" }, { code: "es", name: "西班牙文" }
    ];
    const TGT_LANG_LIST = SRC_LANG_LIST.slice(1);

    const accordion = document.getElementById('keyAccordion');
    function populateSelects() {
        const source = document.getElementById('sourceLang');
        const target = document.getElementById('targetLang');
        source.innerHTML = SRC_LANG_LIST.map(l => `<option value="${l.code}">${l.name}</option>`).join('');
        target.innerHTML = TGT_LANG_LIST.map(l => `<option value="${l.code}">${l.name}</option>`).join('');
        source.value = "auto";
        target.value = "zh-TW";
    }
    populateSelects();

    const geminiInput = document.getElementById('geminiKey');
    const geminiStatus = document.getElementById('geminiStatus');
    
    function loadKeys() {
        const g = localStorage.getItem('gemini_key');
        if (g) { geminiInput.value = g; geminiStatus.innerText = '✅ 金鑰已載入'; }
    }
    document.getElementById('saveGemini').onclick = () => { let k = geminiInput.value.trim(); if(k){ localStorage.setItem('gemini_key', k); geminiStatus.innerText = '✅ 已儲存'; } };
    document.getElementById('clearGemini').onclick = () => { localStorage.removeItem('gemini_key'); geminiInput.value = ''; geminiStatus.innerText = '🧹 已清除'; };
    loadKeys();

    const sourceText = document.getElementById('sourceText');
    const targetText = document.getElementById('targetText');
    const sourceLang = document.getElementById('sourceLang');
    const targetLang = document.getElementById('targetLang');
    const msgBox = document.getElementById('messageBox');
    const domainSelect = document.getElementById('domainSelect');
    const srtModeCheckbox = document.getElementById('srtModeCheckbox');
    const srtOptions = document.getElementById('srtOptions');
    const srtLayoutSelect = document.getElementById('srtLayoutSelect');
    const translateBtn = document.getElementById('translateBtn');

    function setMsg(msg, type='info') {
        msgBox.innerHTML = msg;
        msgBox.classList.remove('error', 'warning');
        if (type === 'error') msgBox.classList.add('error');
        else if (type === 'warning') msgBox.classList.add('warning');
    }

    srtModeCheckbox.onchange = () => {
        if (srtModeCheckbox.checked) {
            srtOptions.style.opacity = "1";
            srtOptions.style.pointerEvents = "auto";
            translateBtn.innerText = "🎞️ 開始字幕批次翻譯 (後端備援)";
        } else {
            srtOptions.style.opacity = "0.5";
            srtOptions.style.pointerEvents = "none";
            translateBtn.innerText = "✨ 開始翻譯";
        }
    };

    document.getElementById('pasteBtn').onclick = async () => { try { const t = await navigator.clipboard.readText(); sourceText.value = t; setMsg('已貼上'); } catch(e){ setMsg('無法讀取剪貼簿', 'error'); } };
    document.getElementById('clearSource').onclick = () => { sourceText.value = ''; setMsg('原文已清除'); };
    document.getElementById('copyBtn').onclick = async () => { if(targetText.value) { await navigator.clipboard.writeText(targetText.value); setMsg('📋 翻譯結果已成功複製到剪貼簿！'); } };
    document.getElementById('clearTarget').onclick = () => { targetText.value = ''; setMsg('結果已清除'); };
    
    const fileBtn = document.getElementById('fileBtn');
    const fileInput = document.getElementById('fileInput');
    fileBtn.onclick = () => fileInput.click();
    fileInput.onchange = (event) => {
        const file = event.target.files[0];
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) { setMsg('檔案過大，請選擇小於 5MB 的文字檔', 'error'); fileInput.value = ''; return; }
        if (file.name.toLowerCase().endsWith('.srt')) { srtModeCheckbox.checked = true; srtModeCheckbox.onchange(); }
        const reader = new FileReader();
        reader.onload = (e) => { sourceText.value = e.target.result; setMsg(`✅ 已開啟檔案：${file.name}`); };
        reader.readAsText(file, 'UTF-8');
    };
    
    document.getElementById('accordionToggle').onclick = () => accordion.classList.toggle('hide');

    // ============================================================
    //  核心翻譯按鈕 – 改為呼叫後端 API
    // ============================================================
    translateBtn.onclick = async () => {
        const text = sourceText.value.trim();
        if (!text) { setMsg('請輸入內容', 'error'); return; }
        
        // 若未設定 BACKEND_URL 則提醒
        if (BACKEND_URL === "YOUR_RAILWAY_URL") {
            setMsg('❌ 請先將程式碼中的 BACKEND_URL 改為您的 Railway 後端網址！', 'error');
            return;
        }

        const apiKey = localStorage.getItem('gemini_key') || '';   // 可選，若後端設有環境變數則不強制
        const src = sourceLang.value;
        const tgt = targetLang.value;
        const domain = domainSelect.value;
        const layout = srtLayoutSelect.value;
        const isSrt = srtModeCheckbox.checked;

        // 如果是普通翻譯（非 SRT）
        if (!isSrt) {
            if (src === tgt && src !== 'auto') { targetText.value = text; setMsg('來源與目標語言相同'); return; }
            targetText.value = '⏳ 正在透過後端進行翻譯 (Gemini 優先，備援 Google/MyMemory)...';
            setMsg('🔄 傳送請求至後端...');
            try {
                const resp = await fetch(`${BACKEND_URL}/translate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: text,
                        source_lang: src,
                        target_lang: tgt,
                        domain: domain,
                        gemini_key: apiKey || undefined   // 若無金鑰則不傳，後端會用環境變數
                        // 若需要 DeepL 可加 deepl_key
                    })
                });
                const data = await resp.json();
                if (data.result) {
                    targetText.value = data.result;
                    setMsg(`✅ 翻譯完成！(引擎: ${data.engine || '備援'})`);
                } else {
                    throw new Error(data.error || '後端回傳空結果');
                }
            } catch (err) {
                targetText.value = `❌ 錯誤：\n${err.message}`;
                setMsg(err.message, 'error');
            }
            return;
        }

        // ====== SRT 字幕模式 ======
        targetText.value = '⏳ 正在傳送字幕至後端，後端會自動處理備援...';
        setMsg('⏳ 正在解析字幕並請求後端...');
        try {
            const resp = await fetch(`${BACKEND_URL}/translate_srt`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    srt_content: text,
                    source_lang: src,
                    target_lang: tgt,
                    domain: domain,
                    layout_mode: layout,
                    gemini_key: apiKey || undefined
                })
            });
            const data = await resp.json();
            if (data.srt_output) {
                targetText.value = data.srt_output;
                setMsg(`✅ 字幕翻譯完成！共 ${data.count} 條，引擎: ${data.engine || '後端'}`);
            } else {
                throw new Error(data.error || '後端未回傳字幕內容');
            }
        } catch (err) {
            targetText.value = `❌ 字幕處理失敗：\n${err.message}`;
            setMsg(err.message, 'error');
        }
    };
</script>
</body>
</html>
