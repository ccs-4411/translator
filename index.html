<!-- index.html -->
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>智慧翻譯 | 安全後端版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f7fb; font-family: system-ui, sans-serif; padding: 0; }
        .container { max-width: 800px; margin: 0 auto; padding: 16px; }
        h1 { font-size: 1.4rem; margin-bottom: 16px; text-align: center; color: #2c3e66; }
        .translate-card { background: white; border-radius: 24px; padding: 16px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .box-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        select { flex: 2; padding: 10px; border-radius: 40px; border: 1px solid #cfdde6; background: white; font-size: 0.9rem; }
        button { background: #eef2f8; border: none; padding: 8px 16px; border-radius: 40px; cursor: pointer; font-size: 0.8rem; }
        button.primary { background: #2c3e66; color: white; }
        button.danger { background: #fff0f0; color: #b13e3e; border: 1px solid #ffcdcd; }
        textarea { width: 100%; padding: 14px; font-size: 1rem; border-radius: 20px; border: 1px solid #e2e8f0; resize: vertical; min-height: 160px; }
        .translate-bar { text-align: center; margin: 8px 0 16px; }
        .btn-translate { background: #2c3e66; color: white; padding: 12px 24px; font-size: 1rem; border-radius: 60px; width: 80%; max-width: 260px; border: none; }
        .message { background: #eef2fa; border-radius: 20px; padding: 10px 16px; font-size: 0.8rem; border-left: 4px solid #5f7f9e; margin-top: 12px; }
        .error { background: #ffefef; border-left-color: #d9534f; color: #a94442; }
        footer { text-align: center; font-size: 0.7rem; color: #6c7a8e; margin-top: 24px; }
        @media (max-width: 640px) {
            .container { padding: 12px; }
            textarea { min-height: 140px; }
            .box-header { flex-direction: column; align-items: stretch; }
            select { width: 100%; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🌍 多引擎翻譯 (後端代理)</h1>
    <div class="translate-card">
        <div class="box-header">
            <select id="sourceLang"></select>
            <div><button id="pasteBtn">📋 貼入</button><button id="clearSourceBtn" class="danger">🗑️ 清除</button></div>
        </div>
        <textarea id="sourceText" placeholder="輸入要翻譯的文字..."></textarea>
    </div>
    <div class="translate-card">
        <div class="box-header">
            <select id="targetLang"></select>
            <div><button id="copyBtn">📋 複製</button><button id="clearTargetBtn" class="danger">🗑️ 清除</button></div>
        </div>
        <textarea id="targetText" placeholder="翻譯結果..." readonly></textarea>
    </div>
    <div class="translate-bar">
        <button id="translateBtn" class="btn-translate">✨ 開始翻譯</button>
    </div>
    <div id="messageBox" class="message">✅ 就緒 | 引擎: Gemini → 英法德:Google / 日韓:DeepL(有Key) → Google降級</div>
    <footer>API Key 存放於伺服器環境變數，前端不暴露</footer>
</div>

<script>
    // 語言設定
    const LANG_LIST = [
        { code: "zh-TW", name: "繁體中文" }, { code: "zh-CN", name: "簡體中文" },
        { code: "en", name: "英文" }, { code: "ja", name: "日文" },
        { code: "ko", name: "韓文" }, { code: "fr", name: "法文" }, { code: "de", name: "德文" }
    ];
    function populateSelects() {
        const sourceSel = document.getElementById('sourceLang');
        const targetSel = document.getElementById('targetLang');
        const options = LANG_LIST.map(l => `<option value="${l.code}">${l.name}</option>`).join('');
        sourceSel.innerHTML = options;
        targetSel.innerHTML = options;
        sourceSel.value = "zh-TW";
        targetSel.value = "en";
    }
    populateSelects();

    const sourceText = document.getElementById('sourceText');
    const targetText = document.getElementById('targetText');
    const sourceLang = document.getElementById('sourceLang');
    const targetLang = document.getElementById('targetLang');
    const translateBtn = document.getElementById('translateBtn');
    const pasteBtn = document.getElementById('pasteBtn');
    const clearSourceBtn = document.getElementById('clearSourceBtn');
    const copyBtn = document.getElementById('copyBtn');
    const clearTargetBtn = document.getElementById('clearTargetBtn');
    const messageBox = document.getElementById('messageBox');

    function setMessage(msg, isError = false) {
        messageBox.innerHTML = msg;
        messageBox.classList.toggle('error', isError);
    }

    async function translate() {
        const text = sourceText.value.trim();
        if (!text) { setMessage("❌ 請輸入要翻譯的文字", true); return; }
        const src = sourceLang.value;
        const tgt = targetLang.value;
        if (src === tgt) {
            targetText.value = text;
            setMessage("✅ 來源語言和目標語言相同，已複製原文");
            return;
        }
        targetText.value = "⏳ 翻譯中...";
        setMessage("🔄 正在呼叫後端翻譯...");
        try {
            const response = await fetch("/translate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text, source_lang: src, target_lang: tgt })
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.error || "翻譯失敗");
            targetText.value = data.result;
            setMessage(`✅ 翻譯完成 (引擎: ${data.engine})`);
        } catch (err) {
            targetText.value = "❌ 翻譯出錯";
            setMessage(`❌ 錯誤: ${err.message}`, true);
        }
    }

    async function pasteFromClipboard() {
        try {
            const text = await navigator.clipboard.readText();
            sourceText.value = text;
            setMessage("📋 已貼上文字");
        } catch { setMessage("無法讀取剪貼簿", true); }
    }
    function clearSource() { sourceText.value = ""; setMessage("原文已清除"); }
    async function copyResult() {
        if (!targetText.value) { setMessage("沒有翻譯結果可複製", true); return; }
        await navigator.clipboard.writeText(targetText.value);
        setMessage("📋 翻譯結果已複製");
    }
    function clearTarget() { targetText.value = ""; setMessage("翻譯結果已清除"); }

    translateBtn.addEventListener('click', translate);
    pasteBtn.addEventListener('click', pasteFromClipboard);
    clearSourceBtn.addEventListener('click', clearSource);
    copyBtn.addEventListener('click', copyResult);
    clearTargetBtn.addEventListener('click', clearTarget);
</script>
</body>
</html>
