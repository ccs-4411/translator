services:
  - type: web
    name: translator
    runtime: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.9
      - key: GEMINI_API_KEY
        sync: false
      - key: DEEPL_API_KEY
        sync: false
